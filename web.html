<!DOCTYPE html>
<html lang="en">
<head>
<title>Meck AI</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#0a0a0a;
  --card:#111111;
  --border:#1f1f1f;
  --text:#e5e5e5;
  --muted:#9ca3af;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

html, body{ height:100%; }

body{
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
}

.header{
  text-align:center;
  padding:20px 15px 10px;
  border-bottom:1px solid var(--border);
}

.chat-box{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:12px;
  min-height:0;
}

.msg{
  padding:12px 14px;
  border-radius:14px;
  max-width:85%;
}

.user{
  align-self:flex-end;
  background:#fff;
  color:#000;
}

.bot{
  align-self:flex-start;
  background:#1a1a1a;
}

pre{
  background:#000;
  padding:12px;
  border-radius:10px;
  position:relative;
}

.copy-btn{
  position:absolute;
  top:8px;
  right:8px;
  background:#222;
  color:#fff;
  border:none;
  padding:4px 8px;
  border-radius:6px;
  cursor:pointer;
}

.input-area{
  display:flex;
  gap:10px;
  padding:12px;
  border-top:1px solid var(--border);
}

.input-area input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0f0f0f;
  color:white;
}

.input-area button{
  padding:12px;
  background:#fff;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
  <h2>Meck AI</h2>
  <p>Ask anything about robotics & coding</p>
</div>

<div id="messages" class="chat-box"></div>

<div class="input-area">
  <input type="text" id="input" placeholder="Type your message..." />
  <button onclick="send()">➤</button>
</div>

<script>

const API_URL = "https://www.meckai.mecknown.in/chat";

function escapeHTML(str){
  return str.replace(/[&<>\"']/g, function(tag){
    const chars = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    };
    return chars[tag];
  });
}

function formatMessage(text){

  text = text.replace(/```([\s\S]*?)```/g, (match, code) => {
    return `
    <pre>
      <button class="copy-btn" onclick="copyCode(this)">Copy</button>
      <code>${escapeHTML(code)}</code>
    </pre>`;
  });

  text = text.replace(/^### (.*)$/gim, "<h3>$1</h3>");
  text = text.replace(/^## (.*)$/gim, "<h2>$1</h2>");
  text = text.replace(/^# (.*)$/gim, "<h1>$1</h1>");

  text = text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");

  text = text.replace(/\n/g, "<br>");

  return text;
}

function copyCode(btn){
  const code = btn.nextElementSibling.innerText;
  navigator.clipboard.writeText(code);
  btn.innerText="Copied!";
  setTimeout(()=>btn.innerText="Copy",1000);
}

function typeMessage(el, html){
  let i=0;
  let temp=document.createElement("div");
  temp.innerHTML=html;
  let text=temp.innerText;

  function type(){
    if(i<text.length){
      el.innerHTML=text.slice(0,i)+"▌";
      i++;
      setTimeout(type,10);
    }else{
      el.innerHTML=html;
    }
  }
  type();
}

async function send(){

  let input=document.getElementById("input");
  let msg=input.value.trim();
  if(!msg) return;

  let box=document.getElementById("messages");

  box.innerHTML += `<div class="msg user">${msg}</div>`;
  input.value="";

  let bot=document.createElement("div");
  bot.className="msg bot";
  bot.innerHTML="⏳ Waking up AI...";
  box.appendChild(bot);

  box.scrollTop=box.scrollHeight;

  async function tryFetch(){
    try{
      let res=await fetch(API_URL,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({message:msg})
      });

      if(!res.ok) throw new Error();

      let data=await res.json();
      let formatted=formatMessage(data.reply);
      typeMessage(bot, formatted);

    }catch{
      bot.innerHTML="⏳ Still waking up...";
      setTimeout(tryFetch, 3000);
    }
  }

  tryFetch();
}

document.getElementById("input").addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});

</script>

</body>
</html>
