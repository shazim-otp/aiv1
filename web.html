<!DOCTYPE html>
<html>
<head>
    <title>Nemotron Chat</title>
    <style>
        body { font-family: Arial; background: #111; color: white; }
        #chat { max-width: 600px; margin: auto; padding: 20px; }
        .msg { margin: 10px 0; }
        .user { color: #00ffcc; }
        .bot { color: #ffffff; }
        input { width: 80%; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>

<div id="chat">
    <h2>🤖 Nemotron AI</h2>

    <div id="messages"></div>

    <input type="text" id="input" placeholder="Type your message..." />
    <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    let input = document.getElementById("input");
    let message = input.value.trim();

    if (!message) return;

    let messagesDiv = document.getElementById("messages");

    // Show user message
    messagesDiv.innerHTML += `<div class="msg user">You: ${message}</div>`;

    input.value = "";

    try {
        let res = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: message })
        });

        let data = await res.json();

        // Show bot reply
        messagesDiv.innerHTML += `<div class="msg bot">AI: ${data.reply}</div>`;

        messagesDiv.scrollTop = messagesDiv.scrollHeight;

    } catch (err) {
        messagesDiv.innerHTML += `<div class="msg bot">Error connecting to server</div>`;
    }
}
</script>

</body>
</html>
