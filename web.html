<!DOCTYPE html><html lang="en">
<head><title>Meck AI</title><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>

/* ===== THEME ===== */
:root{
  --bg:#0a0a0a;
  --card:#111111;
  --border:#1f1f1f;
  --text:#e5e5e5;
  --muted:#9ca3af;
}

/* ===== GLOBAL ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

html, body{
  height:100%;
}

body{
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */
.header{
  text-align:center;
  padding:20px 15px 10px;
  border-bottom:1px solid var(--border);
}

.header h2{font-size:20px;}
.header p{font-size:13px;color:var(--muted);margin-top:5px;}

/* ===== CHAT ===== */
.chat-box{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:12px;
  min-height:0;
}

/* MESSAGE */
.msg{
  padding:12px 14px;
  border-radius:14px;
  max-width:85%;
  font-size:14px;
  line-height:1.5;
  word-wrap:break-word;
}

.user{
  align-self:flex-end;
  background:#fff;
  color:#000;
}

.bot{
  align-self:flex-start;
  background:#1a1a1a;
}

/* ===== CODE BLOCK ===== */
pre{
  background:#000;
  padding:12px;
  border-radius:10px;
  overflow:auto;
  position:relative;
  margin-top:8px;
}

.copy-btn{
  position:absolute;
  top:8px;
  right:8px;
  background:#222;
  color:#fff;
  border:none;
  padding:4px 8px;
  font-size:12px;
  border-radius:6px;
  cursor:pointer;
}

/* ===== INPUT ===== */
.input-area{
  display:flex;
  gap:10px;
  padding:12px;
  border-top:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
}

.input-area input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0f0f0f;
  color:white;
}

.input-area button{
  padding:12px 16px;
  border-radius:10px;
  border:none;
  background:#fff;
  color:#000;
}

/* ===== HEADINGS ===== */
.msg h1, .msg h2, .msg h3{
  margin:8px 0;
}

/* ===== LIST ===== */
.msg ul{
  margin-left:15px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .msg{font-size:13px;}
}

</style></head><body><div class="header">
  <h2>Meck AI</h2>
  <p>Ask anything about robotics & coding</p>
</div><div id="messages" class="chat-box"></div><div class="input-area">
  <input type="text" id="input" placeholder="Type your message..." />
  <button onclick="send()">➤</button>
</div><script>

/* FORMAT MESSAGE */
function formatMessage(text){
  // code blocks ```
  text = text.replace(/```([\s\S]*?)```/g, (match, code) => {
    return `
      <pre>
        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
        <code>${escapeHTML(code)}</code>
      </pre>`;

});

// headings
text = text.replace(/^### (.$)/gim, "<h3>$1</h3>");
text = text.replace(/^## (.$)/gim, "<h2>$1</h2>");
text = text.replace(/^# (.*$)/gim, "<h1>$1</h1>");

// bold
text = text.replace(/**(.*?)**/g, "<b>$1</b>");

// lists
text = text.replace(/^- (.$)/gim, "<li>$1</li>");
text = text.replace(/(<li>.</li>)/g, "<ul>$1</ul>");

// line breaks
text = text.replace(/\n/g, "<br>");

return text;
}

/* ESCAPE HTML */
function escapeHTML(str){
return str.replace(/[&<>"']/g, function(tag){
const chars = {
'&': '&',
'<': '<',
'>': '>',
'"': '"',
"'": '''
};
return chars[tag] || tag;
});
}

/* COPY CODE */
function copyCode(btn){
const code = btn.nextElementSibling.innerText;
navigator.clipboard.writeText(code);
btn.innerText = "Copied!";
setTimeout(()=>btn.innerText="Copy",1000);
}

/* TYPE ANIMATION */
function typeMessage(element, html){
let i = 0;
let temp = document.createElement("div");
temp.innerHTML = html;
let text = temp.innerText;

function typing(){
if(i < text.length){
element.innerHTML = text.slice(0, i) + "▌";
i++;
setTimeout(typing, 10);
} else {
element.innerHTML = html;
}
}

typing();
}

/* SEND MESSAGE */
async function send(){
let input=document.getElementById("input");
let message=input.value.trim();
if(!message) return;

let messagesDiv=document.getElementById("messages");

messagesDiv.innerHTML+="<div class="msg user">${message}</div>";
input.value="";
messagesDiv.scrollTop=messagesDiv.scrollHeight;

let botDiv=document.createElement("div");
botDiv.className="msg bot";
messagesDiv.appendChild(botDiv);

try{
let res=await fetch("/chat",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({message})
});

let data=await res.json();
let formatted = formatMessage(data.reply);

typeMessage(botDiv, formatted);

setTimeout(()=>{
  messagesDiv.scrollTop=messagesDiv.scrollHeight;
},500);

}catch{
botDiv.innerHTML="Error connecting to server";
}
}

/* ENTER KEY */
document.getElementById("input").addEventListener("keydown",e=>{
if(e.key==="Enter") send();
});

/* AUTO FOCUS */
window.onload=()=>{
document.getElementById("input").focus();
};

</script></body>
</html>
