<!DOCTYPE html>
<html lang="en">
<head>

<title>Meck AI</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== THEME ===== */
:root{
  --bg:#0a0a0a;
  --card:#111111;
  --border:#1f1f1f;
  --text:#e5e5e5;
  --muted:#9ca3af;
}

/* ===== GLOBAL ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  height:100dvh;
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */
.header{
  text-align:center;
  padding:20px 15px 10px;
  border-bottom:1px solid var(--border);
}

.header h2{
  font-size:20px;
}

.header p{
  font-size:13px;
  color:var(--muted);
  margin-top:5px;
}

/* ===== CHAT ===== */
.chat-box{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MESSAGE */
.msg{
  padding:12px 14px;
  border-radius:14px;
  max-width:80%;
  font-size:14px;
  line-height:1.4;
}

.user{
  align-self:flex-end;
  background:#fff;
  color:#000;
}

.bot{
  align-self:flex-start;
  background:#1a1a1a;
}

/* ===== INPUT ===== */
.input-area{
  display:flex;
  gap:10px;
  padding:12px;
  border-top:1px solid var(--border);
  background:var(--bg);
}

.input-area input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0f0f0f;
  color:white;
  font-size:14px;
}

.input-area button{
  padding:12px 16px;
  border-radius:10px;
  border:none;
  background:#fff;
  color:#000;
}

/* ===== MOBILE IMPROVEMENT ===== */
@media(max-width:768px){
  .header h2{font-size:18px;}
  .msg{font-size:13px;}
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>Meck AI</h2>
  <p>Ask anything about robotics & coding</p>
</div>

<!-- CHAT -->
<div id="messages" class="chat-box"></div>

<!-- INPUT -->
<div class="input-area">
  <input type="text" id="input" placeholder="Type your message..." />
  <button onclick="send()">➤</button>
</div>

<script>

/* CHAT FUNCTION (UNCHANGED) */
async function send(){
  let input=document.getElementById("input");
  let message=input.value.trim();

  if(!message) return;

  let messagesDiv=document.getElementById("messages");

  messagesDiv.innerHTML+=`<div class="msg user">${message}</div>`;
  input.value="";

  messagesDiv.scrollTop=messagesDiv.scrollHeight;

  try{
    let res=await fetch("/chat",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({message})
    });

    let data=await res.json();

    messagesDiv.innerHTML+=`<div class="msg bot">${data.reply}</div>`;
    messagesDiv.scrollTop=messagesDiv.scrollHeight;

  }catch{
    messagesDiv.innerHTML+=`<div class="msg bot">Error connecting to server</div>`;
  }
}

/* ENTER KEY */
document.getElementById("input").addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});

/* AUTO FOCUS MOBILE */
window.onload=()=>{
  document.getElementById("input").focus();
};

</script>

</body>
</html>
